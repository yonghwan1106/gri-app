<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <style>
      .contour { fill: none; stroke: #C4873B; stroke-width: 0.8; opacity: 0.35; }
    </style>
  </defs>
  <!-- Vintage topographic contour lines -->
  <ellipse class="contour" cx="200" cy="200" rx="180" ry="140"/>
  <ellipse class="contour" cx="200" cy="200" rx="155" ry="118"/>
  <ellipse class="contour" cx="200" cy="200" rx="130" ry="96"/>
  <ellipse class="contour" cx="200" cy="200" rx="105" ry="74"/>
  <ellipse class="contour" cx="200" cy="200" rx="80" ry="52"/>
  <ellipse class="contour" cx="200" cy="200" rx="55" ry="32"/>
  <ellipse class="contour" cx="200" cy="200" rx="32" ry="16"/>
  <!-- Secondary contour cluster top-right -->
  <ellipse class="contour" cx="340" cy="80" rx="70" ry="55"/>
  <ellipse class="contour" cx="340" cy="80" rx="50" ry="38"/>
  <ellipse class="contour" cx="340" cy="80" rx="30" ry="22"/>
  <!-- Secondary contour cluster bottom-left -->
  <ellipse class="contour" cx="70" cy="320" rx="65" ry="48"/>
  <ellipse class="contour" cx="70" cy="320" rx="45" ry="32"/>
  <ellipse class="contour" cx="70" cy="320" rx="25" ry="18"/>
  <!-- Horizontal grid lines (map graticule) -->
  <line class="contour" x1="0" y1="100" x2="400" y2="100" stroke-dasharray="4,8"/>
  <line class="contour" x1="0" y1="200" x2="400" y2="200" stroke-dasharray="4,8"/>
  <line class="contour" x1="0" y1="300" x2="400" y2="300" stroke-dasharray="4,8"/>
  <line class="contour" x1="100" y1="0" x2="100" y2="400" stroke-dasharray="4,8"/>
  <line class="contour" x1="200" y1="0" x2="200" y2="400" stroke-dasharray="4,8"/>
  <line class="contour" x1="300" y1="0" x2="300" y2="400" stroke-dasharray="4,8"/>
</svg>
